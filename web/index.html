<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字人AI - 问卷系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --bg: #F9FAFB;
            --card: #FFFFFF;
            --text: #1F2937;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .user-info {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-info span {
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        /* Main Content */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        /* Cards */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .card-title .icon {
            font-size: 1.3rem;
        }
        
        /* Progress */
        .progress-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .progress-item {
            flex: 1;
            text-align: center;
            padding: 1rem;
            background: var(--bg);
            border-radius: 12px;
        }
        
        .progress-item .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .progress-item .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        /* Questionnaire List */
        .questionnaire-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .questionnaire-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: var(--bg);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
        }
        
        .questionnaire-item:hover {
            background: #EEF2FF;
        }
        
        .questionnaire-item.completed {
            background: #ECFDF5;
        }
        
        .qi-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 1rem;
        }
        
        .questionnaire-item.completed .qi-icon {
            background: var(--success);
        }
        
        .qi-info {
            flex: 1;
        }
        
        .qi-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .qi-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .qi-status {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: var(--warning);
            color: white;
        }
        
        .questionnaire-item.completed .qi-status {
            background: var(--success);
        }
        
        /* Persona Section */
        .persona-section {
            text-align: center;
            padding: 2rem 1rem;
        }
        
        .persona-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .persona-status {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        /* Loading */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .loading.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Auth Required */
        .auth-required {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
        }
        
        .auth-required.active {
            display: block;
        }
        
        .auth-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        
        .auth-buttons .btn {
            min-width: 120px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1F2937;
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🧠 数字人 AI</h1>
        <p>构建你的专属 AI 数字分身</p>
        <div class="user-info" id="userInfo" style="display: none;">
            <span id="username"></span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </header>
    
    <main class="container">
        <!-- 未登录 -->
        <div class="auth-required active" id="authSection">
            <div class="card">
                <div class="persona-section">
                    <div class="persona-icon">👤</div>
                    <p class="persona-status">登录后开始问卷调查<br>构建你的 AI 数字分身</p>
                    <div class="auth-buttons">
                        <a href="/login" class="btn btn-primary">登录</a>
                        <a href="/register" class="btn btn-success">注册</a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 已登录 -->
        <div id="mainSection" style="display: none;">
            <!-- 进度 -->
            <div class="card">
                <div class="progress-section">
                    <div class="progress-item">
                        <div class="number" id="completedCount">0</div>
                        <div class="label">已完成</div>
                    </div>
                    <div class="progress-item">
                        <div class="number" id="pendingCount">4</div>
                        <div class="label">待完成</div>
                    </div>
                </div>
            </div>
            
            <!-- 问卷列表 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📋</span>
                    问卷调查
                </div>
                <div class="questionnaire-list" id="questionnaireList">
                    <!-- 动态加载 -->
                </div>
            </div>
            
            <!-- 人格画像 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">🧠</span>
                    人格画像
                </div>
                <div class="persona-section" id="personaSection">
                    <div class="persona-icon">⏳</div>
                    <p class="persona-status" id="personaStatus">完成问卷后生成人格画像</p>
                    <a href="/persona" class="btn btn-primary" id="personaBtn" style="display: none;">查看画像</a>
                    <button class="btn btn-success" id="buildPersonaBtn" style="display: none;" onclick="buildPersona()">生成画像</button>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('token');
        let username = localStorage.getItem('username');
        let userId = localStorage.getItem('userId');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                showMainSection();
                loadDashboard();
            }
        });
        
        function showMainSection() {
            document.getElementById('authSection').classList.remove('active');
            document.getElementById('mainSection').style.display = 'block';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('username').textContent = username || '用户';
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function setLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }
        
        async function loadDashboard() {
            if (!token) return;
            
            setLoading(true);
            try {
                const res = await fetch(`${API_BASE}/dashboard`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                // 更新进度
                document.getElementById('completedCount').textContent = data.questionnaire_status.completed;
                document.getElementById('pendingCount').textContent = data.questionnaire_status.pending.length;
                
                // 更新问卷列表
                const list = document.getElementById('questionnaireList');
                list.innerHTML = '';
                
                // 已完成
                data.questionnaire_status.completed_list.forEach(q => {
                    list.innerHTML += `
                        <div class="questionnaire-item completed" onclick="location.href='/questionnaire?id=${q.id}'">
                            <div class="qi-icon">✓</div>
                            <div class="qi-info">
                                <div class="qi-name">${q.name}</div>
                                <div class="qi-meta">已回答 ${q.answered_count} 题</div>
                            </div>
                            <span class="qi-status">已完成</span>
                        </div>
                    `;
                });
                
                // 待完成
                data.questionnaire_status.pending.forEach(q => {
                    list.innerHTML += `
                        <div class="questionnaire-item" onclick="location.href='/questionnaire?id=${q.id}'">
                            <div class="qi-icon">📝</div>
                            <div class="qi-info">
                                <div class="qi-name">${q.name}</div>
                                <div class="qi-meta">${q.question_count} 题</div>
                            </div>
                            <span class="qi-status">待完成</span>
                        </div>
                    `;
                });
                
                // 人格画像状态
                const personaBtn = document.getElementById('personaBtn');
                const buildBtn = document.getElementById('buildPersonaBtn');
                const personaStatus = document.getElementById('personaStatus');
                const personaIcon = document.querySelector('#personaSection .persona-icon');
                
                if (data.persona_status === 'completed') {
                    personaIcon.textContent = '🧠';
                    personaStatus.textContent = '人格画像已生成';
                    personaBtn.style.display = 'inline-block';
                    buildBtn.style.display = 'none';
                } else if (data.questionnaire_status.completed >= 2) {
                    personaIcon.textContent = '✨';
                    personaStatus.textContent = '可以生成人格画像了';
                    buildBtn.style.display = 'inline-block';
                    personaBtn.style.display = 'none';
                } else {
                    personaIcon.textContent = '⏳';
                    personaStatus.textContent = '完成至少2份问卷后生成';
                    buildBtn.style.display = 'none';
                }
                
            } catch (err) {
                showToast('加载失败');
                console.error(err);
            }
            setLoading(false);
        }
        
        async function buildPersona() {
            setLoading(true);
            try {
                const res = await fetch(`${API_BASE}/persona/build`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('人格画像生成成功！');
                    loadDashboard();
                } else {
                    showToast(data.error || '生成失败');
                }
            } catch (err) {
                showToast('生成失败');
                console.error(err);
            }
            setLoading(false);
        }
        
        async function logout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } catch (err) {}
            
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('userId');
            location.reload();
        }
    </script>
</body>
</html>
