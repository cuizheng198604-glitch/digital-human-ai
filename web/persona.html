<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人格画像 - 数字人AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --success: #10B981;
            --warning: #F59E0B;
            --bg: #F9FAFB;
            --card: #FFFFFF;
            --text: #1F2937;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header h1 {
            font-size: 1.1rem;
            flex: 1;
        }
        
        /* Container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        /* Avatar Card */
        .avatar-card {
            background: var(--card);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .user-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        /* Description Card */
        .description-card {
            background: var(--card);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .description-text {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
            padding: 1rem;
            background: var(--bg);
            border-radius: 12px;
        }
        
        /* Big Five Card */
        .bigfive-card {
            background: var(--card);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .trait-item {
            margin-bottom: 1.25rem;
        }
        
        .trait-item:last-child {
            margin-bottom: 0;
        }
        
        .trait-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .trait-name {
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        .trait-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .trait-bar {
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .trait-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        
        .trait-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        /* Not Built */
        .not-built {
            text-align: center;
            padding: 3rem 1rem;
        }
        
        .not-built-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .not-built-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .not-built-text {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            border: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        /* Loading */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .loading.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Auth Required */
        .auth-required {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
        }
        
        .auth-required.active {
            display: block;
        }
        
        .auth-required a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>人格画像</h1>
        </div>
    </header>
    
    <main class="container">
        <!-- 未登录 -->
        <div class="auth-required active" id="authSection">
            <div class="avatar-card">
                <div class="not-built">
                    <div class="not-built-icon">🔒</div>
                    <div class="not-built-title">请先登录</div>
                    <p class="not-built-text">登录后才能查看人格画像</p>
                    <a href="/login" class="btn btn-primary">去登录</a>
                </div>
            </div>
        </div>
        
        <!-- 未构建 -->
        <div class="avatar-card" id="notBuiltSection" style="display: none;">
            <div class="not-built">
                <div class="not-built-icon">⏳</div>
                <div class="not-built-title">人格画像未生成</div>
                <p class="not-built-text">完成问卷调查后即可生成你的专属人格画像</p>
                <a href="/" class="btn btn-primary">返回首页</a>
            </div>
        </div>
        
        <!-- 画像内容 -->
        <div id="personaContent" style="display: none;">
            <!-- 头像 -->
            <div class="avatar-card">
                <div class="avatar">🧑‍💻</div>
                <div class="user-name" id="userName">用户</div>
                <div class="user-label">AI 数字分身</div>
            </div>
            
            <!-- 文字描述 -->
            <div class="description-card">
                <div class="card-title">📝 人格描述</div>
                <div class="description-text" id="descriptionText">
                    加载中...
                </div>
            </div>
            
            <!-- 大五人格 -->
            <div class="bigfive-card">
                <div class="card-title">🧠 大五人格分析</div>
                
                <div class="trait-item">
                    <div class="trait-header">
                        <span class="trait-name">开放性 Openness</span>
                        <span class="trait-value" id="opennessValue">0%</span>
                    </div>
                    <div class="trait-bar">
                        <div class="trait-fill" id="opennessFill" style="width: 0%"></div>
                    </div>
                    <div class="trait-desc">好奇心、创造力和审美能力</div>
                </div>
                
                <div class="trait-item">
                    <div class="trait-header">
                        <span class="trait-name">尽责性 Conscientiousness</span>
                        <span class="trait-value" id="conscientiousnessValue">0%</span>
                    </div>
                    <div class="trait-bar">
                        <div class="trait-fill" id="conscientiousnessFill" style="width: 0%"></div>
                    </div>
                    <div class="trait-desc">自律、责任感和条理性</div>
                </div>
                
                <div class="trait-item">
                    <div class="trait-header">
                        <span class="trait-name">外向性 Extraversion</span>
                        <span class="trait-value" id="extraversionValue">0%</span>
                    </div>
                    <div class="trait-bar">
                        <div class="trait-fill" id="extraversionFill" style="width: 0%"></div>
                    </div>
                    <div class="trait-desc">社交性、活力和积极情绪</div>
                </div>
                
                <div class="trait-item">
                    <div class="trait-header">
                        <span class="trait-name">宜人性 Agreeableness</span>
                        <span class="trait-value" id="agreeablenessValue">0%</span>
                    </div>
                    <div class="trait-bar">
                        <div class="trait-fill" id="agreeablenessFill" style="width: 0%"></div>
                    </div>
                    <div class="trait-desc">同理心、合作和信任他人</div>
                </div>
                
                <div class="trait-item">
                    <div class="trait-header">
                        <span class="trait-name">神经质 Neuroticism</span>
                        <span class="trait-value" id="neuroticismValue">0%</span>
                    </div>
                    <div class="trait-bar">
                        <div class="trait-fill" id="neuroticismFill" style="width: 0%"></div>
                    </div>
                    <div class="trait-desc">情绪稳定性、焦虑和脆弱性</div>
                </div>
            </div>
            
            <!-- 人格雷达建议 -->
            <div class="description-card">
                <div class="card-title">💡 AI 交互建议</div>
                <div class="description-text" id="interactionTips">
                    加载中...
                </div>
            </div>
        </div>
    </main>
    
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>
    
    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('token');
        let username = localStorage.getItem('username');
        
        document.addEventListener('DOMContentLoaded', init);
        
        async function init() {
            if (!token) {
                document.getElementById('authSection').classList.add('active');
                return;
            }
            
            document.getElementById('authSection').classList.remove('active');
            await loadPersona();
        }
        
        function setLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }
        
        async function loadPersona() {
            setLoading(true);
            try {
                // 获取画像描述
                const res = await fetch(`${API_BASE}/persona/description`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    showPersona(data);
                } else {
                    document.getElementById('notBuiltSection').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('notBuiltSection').style.display = 'block';
            }
            setLoading(false);
        }
        
        function showPersona(data) {
            document.getElementById('notBuiltSection').style.display = 'none';
            document.getElementById('personaContent').style.display = 'block';
            
            // 用户名
            document.getElementById('userName').textContent = username || '用户';
            
            // 描述
            document.getElementById('descriptionText').textContent = data.description || '人格画像已生成';
            
            // 大五人格
            const traits = ['openness', 'conscientiousness', 'extraversion', 'agreeableness', 'neuroticism'];
            const traitLabels = {
                openness: '开放性',
                conscientiousness: '尽责性',
                extraversion: '外向性',
                agreeableness: '宜人性',
                neuroticism: '神经质'
            };
            
            traits.forEach(trait => {
                const value = (data.traits[trait] || 0.5) * 100;
                document.getElementById(`${trait}Value`).textContent = `${Math.round(value)}%`;
                document.getElementById(`${trait}Fill`).style.width = `${value}%`;
            });
            
            // 交互建议
            const tips = generateInteractionTips(data.traits);
            document.getElementById('interactionTips').textContent = tips;
        }
        
        function generateInteractionTips(traits) {
            const tips = [];
            
            if (traits.openness > 0.6) {
                tips.push('• 喜欢探索新话题，可以分享有趣的知识和创意');
            } else if (traits.openness < 0.4) {
                tips.push('• 更偏好熟悉和稳定的交流方式');
            }
            
            if (traits.extraversion > 0.6) {
                tips.push('• 外向开朗，喜欢互动和社交话题');
            } else if (traits.extraversion < 0.4) {
                tips.push('• 较为内敛，需要给予思考时间');
            }
            
            if (traits.agreeableness > 0.6) {
                tips.push('• 友善和谐，避免争论和冲突');
            }
            
            if (traits.conscientiousness > 0.6) {
                tips.push('• 注重逻辑和条理，回答可以更有结构');
            }
            
            if (traits.neuroticism > 0.6) {
                tips.push('• 情感细腻，回复时注意语气和表达');
            } else if (traits.neuroticism < 0.4) {
                tips.push('• 情绪稳定，可以更直接坦诚地交流');
            }
            
            return tips.length > 0 ? tips.join('\n') : '• 根据画像分析，为你定制专属的交流风格';
        }
    </script>
</body>
</html>
