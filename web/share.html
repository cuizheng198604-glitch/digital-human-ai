<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字人AI - 人格问卷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --success: #10B981;
            --error: #EF4444;
            --bg: #F9FAFB;
            --card: #FFFFFF;
            --text: #1F2937;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.5rem 1rem;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* Steps */
        .steps {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: white;
            border-bottom: 1px solid var(--border);
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .step.active {
            color: var(--primary);
            font-weight: 600;
        }
        
        .step.completed {
            color: var(--success);
        }
        
        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .step.active .step-num {
            background: var(--primary);
            color: white;
        }
        
        .step.completed .step-num {
            background: var(--success);
            color: white;
        }
        
        .step-line {
            width: 20px;
            height: 2px;
            background: var(--border);
        }
        
        .step.completed + .step-line,
        .step-line.completed {
            background: var(--success);
        }
        
        /* Container */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        /* Welcome */
        .welcome-card {
            background: var(--card);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-align: center;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .welcome-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .welcome-text {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }
        
        /* Question Card */
        .question-card {
            background: var(--card);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .question-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .question-type {
            background: #EEF2FF;
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        
        /* Scale */
        .scale-container {
            margin-bottom: 0.5rem;
        }
        
        .scale-labels-top {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .scale-options {
            display: flex;
            justify-content: space-between;
            gap: 0.25rem;
        }
        
        .scale-option {
            flex: 1;
            aspect-ratio: 1;
            max-width: 50px;
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .scale-option:hover {
            border-color: var(--primary);
        }
        
        .scale-option.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .scale-labels-bottom {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        
        /* Choice */
        .choice-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .choice-option {
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .choice-option:hover {
            border-color: var(--primary);
            background: #F5F3FF;
        }
        
        .choice-option.selected {
            border-color: var(--primary);
            background: #EEF2FF;
        }
        
        .choice-radio {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        
        .choice-option.selected .choice-radio {
            border-color: var(--primary);
            background: var(--primary);
        }
        
        .choice-option.selected .choice-radio::after {
            content: '✓';
            color: white;
            font-size: 0.8rem;
        }
        
        /* Text */
        .text-input {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }
        
        .text-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        /* Navigation */
        .nav-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .nav-buttons .btn {
            flex: 1;
            text-align: center;
        }
        
        /* Progress */
        .progress-bar {
            background: var(--border);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.3s ease;
        }
        
        /* Completion */
        .completion-card {
            background: var(--card);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .completion-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .completion-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 0.5rem;
        }
        
        .completion-text {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        .share-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            margin: 0.5rem;
        }
        
        .share-btn:hover {
            background: #059669;
        }
        
        /* Loading */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
        }
        
        .loading.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            font-size: 1rem;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1F2937;
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* QR Code */
        .qr-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        
        .qr-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .qr-code {
            width: 150px;
            height: 150px;
            background: var(--border);
            border-radius: 12px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        /* Server Config */
        .server-config {
            background: #FEF3C7;
            border: 1px solid #F59E0B;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .server-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #92400E;
            margin-bottom: 0.5rem;
        }
        
        .server-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #D97706;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .server-hint {
            font-size: 0.75rem;
            color: #92400E;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🧠 数字人 AI</h1>
        <p>5分钟构建你的专属人格画像</p>
    </header>
    
    <div class="steps">
        <div class="step active" id="step1">
            <div class="step-num">1</div>
            <span>开始</span>
        </div>
        <div class="step-line" id="line1"></div>
        <div class="step" id="step2">
            <div class="step-num">2</div>
            <span>答题</span>
        </div>
        <div class="step-line" id="line2"></div>
        <div class="step" id="step3">
            <div class="step-num">3</div>
            <span>完成</span>
        </div>
    </div>
    
    <main class="container">
        <!-- Step 1: Welcome -->
        <div id="welcomeSection">
            <div class="welcome-card">
                <div class="welcome-icon">👋</div>
                <div class="welcome-title">欢迎参与问卷调查</div>
                <div class="welcome-text">
                    这是一份简短的人格测评问卷，大约需要 <strong>5-8分钟</strong> 完成。
                    <br><br>
                    通过这份问卷，我们将为你构建一个 <strong>AI 数字分身**，了解你的性格特点、价值观和沟通风格。
                </div>
                
                <!-- Server Config -->
                <div class="server-config">
                    <div class="server-title">🔧 服务器配置</div>
                    <input type="text" class="server-input" id="serverUrl" placeholder="http://localhost:5000">
                    <div class="server-hint">输入本地服务器地址，数据将回传至此服务器</div>
                </div>
                
                <button class="btn btn-primary" onclick="startQuestionnaire()">开始答题</button>
            </div>
        </div>
        
        <!-- Step 2: Questionnaire -->
        <div id="questionnaireSection" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="question-card" id="questionCard">
                <div class="question-meta">
                    <span id="questionNum">1/10</span>
                    <span class="question-type" id="questionType">量表题</span>
                </div>
                <div class="question-text" id="questionText">题目内容</div>
                <div id="optionsArea"></div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
                </div>
            </div>
        </div>
        
        <!-- Step 3: Completion -->
        <div id="completionSection" style="display: none;">
            <div class="completion-card">
                <div class="completion-icon">🎉</div>
                <div class="completion-title">问卷完成！</div>
                <div class="completion-text" id="completionText">感谢你的参与，数据已提交到服务器</div>
                
                <div>
                    <button class="share-btn" onclick="shareResult()">📤 分享链接</button>
                    <button class="share-btn" onclick="copyLink()">📋 复制链接</button>
                </div>
                
                <div class="qr-section">
                    <div class="qr-title">或扫描二维码继续答题</div>
                    <div class="qr-code" id="qrCode">生成中...</div>
                </div>
            </div>
        </div>
    </main>
    
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">加载中...</div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // Configuration
        const API_BASE = localStorage.getItem('serverUrl') || 'http://localhost:5000';
        document.getElementById('serverUrl').value = API_BASE;
        
        // State
        let questionnaires = [];
        let currentQIndex = 0;
        let currentQuestionIndex = 0;
        let answers = {};
        let completedQuestionnaires = new Set();
        
        // Initialize
        document.addEventListener('DOMContentLoaded', init);
        
        async function init() {
            showLoading('正在加载问卷...');
            
            try {
                const res = await fetch(`${API_BASE}/api/questionnaires`);
                if (res.ok) {
                    const data = await res.json();
                    questionnaires = data.questionnaires;
                    
                    // Check which are completed
                    for (const q of questionnaires) {
                        const progressRes = await fetch(`${API_BASE}/api/questionnaire/${q.id}/progress`);
                        if (progressRes.ok) {
                            const progress = await progressRes.json();
                            if (progress.completed_count >= q.question_count) {
                                completedQuestionnaires.add(q.id);
                            }
                        }
                    }
                    
                    hideLoading();
                } else {
                    throw new Error('Failed to load questionnaires');
                }
            } catch (err) {
                hideLoading();
                showToast('无法连接服务器，请检查地址');
                console.error(err);
            }
        }
        
        function saveServerUrl() {
            const url = document.getElementById('serverUrl').value.trim();
            localStorage.setItem('serverUrl', url);
            return url;
        }
        
        function setStep(step) {
            // Update steps
            document.getElementById('step1').className = 'step ' + (step >= 1 ? 'completed' : '');
            document.getElementById('line1').className = 'step-line ' + (step >= 2 ? 'completed' : '');
            document.getElementById('step2').className = 'step ' + (step === 2 ? 'active' : step > 2 ? 'completed' : '');
            document.getElementById('line2').className = 'step-line ' + (step >= 3 ? 'completed' : '');
            document.getElementById('step3').className = 'step ' + (step === 3 ? 'active' : '');
            
            // Show/hide sections
            document.getElementById('welcomeSection').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('questionnaireSection').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('completionSection').style.display = step === 3 ? 'block' : 'none';
        }
        
        async function startQuestionnaire() {
            const serverUrl = saveServerUrl();
            
            if (questionnaires.length === 0) {
                showToast('请先配置服务器地址');
                return;
            }
            
            // Select first incomplete questionnaire
            const nextQ = questionnaires.find(q => !completedQuestionnaires.has(q.id));
            
            if (!nextQ) {
                showToast('所有问卷已完成！');
                setStep(3);
                return;
            }
            
            currentQIndex = questionnaires.indexOf(nextQ);
            currentQuestionIndex = 0;
            
            setStep(2);
            await loadQuestion(currentQIndex, currentQuestionIndex);
        }
        
        async function loadQuestion(qIndex, qIdx) {
            showLoading('加载题目...');
            
            const q = questionnaires[qIndex];
            
            try {
                const res = await fetch(`${API_BASE}/api/questionnaire/${q.id}`);
                if (res.ok) {
                    const data = await res.json();
                    const question = data.questions[qIdx];
                    
                    // Load progress
                    const progressRes = await fetch(`${API_BASE}/api/questionnaire/${q.id}/progress`);
                    if (progressRes.ok) {
                        const progress = await progressRes.json();
                        progress.completed_ids.forEach(id => {
                            if (!answers[q.id]) answers[q.id] = {};
                            // Find question index by id
                            const qIdx = data.questions.findIndex(q => q.id === id);
                            if (qIdx >= 0 && qIdx < data.questions.length) {
                                // Answer will be fetched separately if needed
                            }
                        });
                    }
                    
                    renderQuestion(data, qIdx);
                    setStep(2);
                    hideLoading();
                } else {
                    throw new Error('Failed to load questionnaire');
                }
            } catch (err) {
                hideLoading();
                showToast('加载失败，请检查网络');
                console.error(err);
            }
        }
        
        function renderQuestion(data, qIdx) {
            const q = data.questions[qIdx];
            const total = data.questions.length;
            
            document.getElementById('questionNum').textContent = `${qIdx + 1}/${total}`;
            document.getElementById('questionText').textContent = q.text;
            
            const typeLabels = {
                'scale': '量表题',
                'single_choice': '单选题',
                'multiple_choice': '多选题',
                'text': '文本题'
            };
            document.getElementById('questionType').textContent = typeLabels[q.type] || '题目';
            
            const optionsArea = document.getElementById('optionsArea');
            
            if (q.type === 'scale') {
                const [min, max] = q.scale_range;
                let html = `
                    <div class="scale-container">
                        <div class="scale-labels-top">
                            <span>很不认同</span>
                            <span>非常认同</span>
                        </div>
                        <div class="scale-options">
                `;
                for (let i = min; i <= max; i++) {
                    html += `<div class="scale-option" onclick="selectScale(${i})">${i}</div>`;
                }
                html += '</div><div class="scale-labels-bottom"><span>1</span><span>5</span></div></div>';
                optionsArea.innerHTML = html;
            } else if (q.type === 'single_choice') {
                let html = '<div class="choice-options">';
                q.options.forEach((opt, idx) => {
                    html += `<div class="choice-option" onclick="selectChoice(${idx}, '${opt.replace(/'/g, "\\'")}')">
                        <div class="choice-radio"></div>
                        <div>${opt}</div>
                    </div>`;
                });
                html += '</div>';
                optionsArea.innerHTML = html;
            } else if (q.type === 'multiple_choice') {
                let html = '<div class="choice-options">';
                q.options.forEach((opt, idx) => {
                    html += `<div class="choice-option" onclick="toggleMultiple(${idx}, '${opt.replace(/'/g, "\\'")}')">
                        <div class="choice-radio"></div>
                        <div>${opt}</div>
                    </div>`;
                });
                html += '</div>';
                optionsArea.innerHTML = html;
            } else if (q.type === 'text') {
                optionsArea.innerHTML = `<textarea class="text-input" id="textAnswer" placeholder="请输入你的回答..."></textarea>`;
            }
            
            // Update progress
            const percent = Math.round(((qIdx + 1) / total) * 100);
            document.getElementById('progressFill').style.width = `${percent}%`;
            
            // Update nav buttons
            document.getElementById('prevBtn').disabled = qIdx === 0;
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.textContent = qIdx === total - 1 ? '提交' : '下一题';
            nextBtn.disabled = true; // Must select answer first
        }
        
        async function selectScale(value) {
            const q = questionnaires[currentQIndex];
            const questionId = q.questions ? q.questions[currentQuestionIndex].id : currentQuestionIndex;
            
            document.querySelectorAll('.scale-option').forEach((el, idx) => {
                el.classList.toggle('selected', idx + 1 === value);
            });
            
            document.getElementById('nextBtn').disabled = false;
            
            await saveAnswer(q.id, questionId, value);
        }
        
        async function selectChoice(index, value) {
            const q = questionnaires[currentQIndex];
            
            document.querySelectorAll('.choice-option').forEach((el, idx) => {
                el.classList.toggle('selected', idx === index);
            });
            
            document.getElementById('nextBtn').disabled = false;
            
            await saveAnswer(q.id, q.questions[currentQuestionIndex].id, index);
        }
        
        async function toggleMultiple(index, value) {
            const q = questionnaires[currentQIndex];
            const questionId = q.questions[currentQuestionIndex].id;
            
            if (!answers[q.id]) answers[q.id] = {};
            if (!answers[q.id][questionId]) answers[q.id][questionId] = [];
            
            const idx = answers[q.id][questionId].indexOf(index);
            if (idx > -1) {
                answers[q.id][questionId].splice(idx, 1);
            } else {
                answers[q.id][questionId].push(index);
            }
            
            document.querySelectorAll('.choice-option').forEach((el, i) => {
                el.classList.toggle('selected', answers[q.id][questionId]?.includes(i));
            });
            
            document.getElementById('nextBtn').disabled = answers[q.id][questionId].length === 0;
            
            await saveAnswer(q.id, questionId, answers[q.id][questionId]);
        }
        
        async function saveAnswer(questionnaireId, questionId, answer) {
            try {
                await fetch(`${API_BASE}/api/questionnaire/${questionnaireId}/answer`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question_id: questionId,
                        answer: answer
                    })
                });
            } catch (err) {
                console.error('Failed to save answer:', err);
            }
        }
        
        async function nextQuestion() {
            const q = questionnaires[currentQIndex];
            
            if (currentQuestionIndex < q.questions.length - 1) {
                currentQuestionIndex++;
                await loadQuestion(currentQIndex, currentQuestionIndex);
            } else {
                await submitQuestionnaire();
            }
        }
        
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion(currentQIndex, currentQuestionIndex);
            }
        }
        
        async function submitQuestionnaire() {
            const q = questionnaires[currentQIndex];
            showLoading('提交中...');
            
            try {
                const res = await fetch(`${API_BASE}/api/questionnaire/${q.id}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (res.ok) {
                    completedQuestionnaires.add(q.id);
                    
                    // Check if all done
                    const allDone = questionnaires.every(qq => completedQuestionnaires.has(qq.id));
                    
                    if (allDone) {
                        // Try to build persona
                        try {
                            await fetch(`${API_BASE}/api/persona/build`, { method: 'POST' });
                        } catch (e) {}
                        
                        document.getElementById('completionText').textContent = 
                            '所有问卷已完成！人格画像已生成。';
                    } else {
                        document.getElementById('completionText').textContent = 
                            `已完成 ${completedQuestionnaires.size}/${questionnaires.length} 份问卷`;
                    }
                    
                    setStep(3);
                    generateQRCode();
                } else {
                    throw new Error('Submit failed');
                }
            } catch (err) {
                showToast('提交失败，请重试');
                console.error(err);
            }
            
            hideLoading();
        }
        
        function generateQRCode() {
            const url = window.location.href;
            const qrCode = document.getElementById('qrCode');
            
            // Simple QR code using a free API
            qrCode.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}" style="width:150px;height:150px;border-radius:12px;">`;
        }
        
        function shareResult() {
            const url = window.location.href;
            const text = '我刚完成了数字人AI的人格问卷调查，你也来试试吧！';
            
            if (navigator.share) {
                navigator.share({
                    title: '数字人AI问卷',
                    text: text,
                    url: url
                });
            } else {
                copyToClipboard(url);
            }
        }
        
        function copyLink() {
            copyToClipboard(window.location.href);
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('链接已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败，请手动复制');
            });
        }
        
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
